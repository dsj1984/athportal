name: nightly

on:
  schedule:
    # 06:00 UTC every day — covers the full acceptance corpus and the
    # unit-tier mutation report. Outside the PR/push gates so a long
    # mutation run never blocks merge velocity.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-acceptance:
    name: Full acceptance corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium

      - name: Generate BDD bindings
        run: pnpm --filter @repo/web exec bddgen

      - name: Run full acceptance corpus
        run: pnpm --filter @repo/web exec playwright test

      - name: Upload Cucumber JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-full
          path: apps/web/test-results/cucumber.json
          if-no-files-found: warn

  mutation:
    name: Stryker mutation (unit tier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Stryker
        run: pnpm run mutation

      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/mutation.html
          if-no-files-found: warn

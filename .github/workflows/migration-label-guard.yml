name: migration-label-guard

# Enforces the destructive-migration policy recorded in
# docs/decisions.md and README.md § "Destructive migrations":
#   - Scans the PR diff for added DROP / RENAME / NOT NULL clauses
#     inside Drizzle migration files under apps/api/**/migrations/**.
#   - Fails the check when matches are found without the
#     migration::destructive label on the PR.
#   - Passes trivially when no migration files are touched (the
#     apps/api workspace and its migrations directory may not yet
#     exist on a given branch).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Guard destructive migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Scan PR diff for destructive migration clauses
        uses: actions/github-script@v7
        with:
          script: |
            const mod = await import(`${process.env.GITHUB_WORKSPACE}/scripts/migration-label-guard.mjs`);
            await mod.default(github, context, core);

# Default-branch historical-leak signal.
#
# The PR-blocking gitleaks job in quality.yml only sees the diff that
# arrives via pull_request. Force-pushes, merge-from-fork events, and any
# other path that bypasses a PR can land secrets on `main` that the PR
# scanner never observed. This workflow fires gitleaks against the full
# history on every push to `main` so historical leaks surface as Code
# Scanning alerts even though they cannot retro-block the PR that
# delivered them.
#
# Operator-facing PR gate stays gitleaks-pr in quality.yml; this workflow
# is a signal channel, not a gate.
name: secret-scan-push

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-history:
    name: gitleaks (full history, post-merge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # fetch-depth: 0 pulls the complete history so gitleaks can scan
          # every commit reachable from main, not just the merge tip.
          fetch-depth: 0
          persist-credentials: false

      - name: gitleaks scan
        # `continue-on-error: true` ensures a finding does not retro-block
        # the merge that already landed; the SARIF upload step below still
        # raises the Code Scanning alert so the operator sees it.
        continue-on-error: true
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: results.sarif
          category: gitleaks-history

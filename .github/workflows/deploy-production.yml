name: deploy-production

# Production gated deploy. workflow_dispatch only — the GitHub
# `production` Environment carries the required-reviewer approval rule
# (see docs/runbooks/branch-protection-setup.md), so a human operator
# is the single audited gate between `main` and a production state
# mutation. The architectural rationale (Environment Secrets boundary,
# isolation-audit invariant, six-step deploy order) lives in Tech
# Spec #134 § Environment promotion model and § Security & Privacy
# Considerations.
#
# Why workflow_dispatch only:
#   - production deploys are intentional, never automatic on `push`
#   - the reviewer-approval rule on the `production` Environment is
#     the single audited human gate; without it, a `push` trigger
#     would bypass the rule entirely
#
# Why two job shapes (deploy + isolation-audit):
#   - `deploy` declares `environment: production` so it can read
#     production Environment Secrets
#   - `isolation-audit` intentionally OMITS `environment: production`
#     and asserts that production secrets are physically unreadable
#     from a job without the Environment declaration. This converts
#     the secret-isolation property from an assumed invariant into a
#     tested invariant per Tech Spec #134 § Secret isolation.

on:
  workflow_dispatch:

permissions:
  contents: read

# Serialize production deploys. Unlike staging we do NOT cancel an
# in-flight run — a production deploy mid-flight should complete or
# fail explicitly, not be interrupted by a newer dispatch.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Isolation audit ─────────────────────────────────────────────
  # Runs first and intentionally omits `environment: production`. If
  # GitHub's Environment Secret boundary is intact, this job sees the
  # production-only secret as empty and the workflow proceeds. If the
  # secret IS readable here, the Environment boundary has regressed
  # (e.g. the secret was mistakenly moved to repo-level) and the
  # whole workflow MUST fail before any state mutation runs.
  #
  # We probe via a job-level `env:` mapping rather than `${{ secrets.* }}`
  # in `if:` — the latter is evaluated in the workflow expression
  # context which can short-circuit. Reading via env at runtime gives
  # us the same physical isolation property the deploy job relies on.
  isolation-audit:
    name: Secret isolation audit
    runs-on: ubuntu-latest
    # Intentionally no `environment:` declaration here. This is the
    # whole point of the audit — without the declaration, production
    # Environment Secrets MUST be unreadable.
    env:
      # CLOUDFLARE_API_TOKEN is the canonical production-only secret
      # (per Tech Spec #134 § Secret isolation). If it leaks into
      # this audit job, the Environment boundary is broken.
      PROD_SECRET_PROBE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Assert production secret is unreadable
        run: |
          if [ -n "$PROD_SECRET_PROBE" ]; then
            echo "::error::Production Environment Secret was readable from a job without environment: production. Boundary is broken — refusing to proceed."
            exit 1
          fi
          echo "isolation OK — production Environment Secret is empty in a job without environment: production"

  # ── Production deploy ───────────────────────────────────────────
  # Mirrors the staging six-step order against production targets,
  # gated on the isolation audit passing. Every secret-touching job
  # declares `environment: production` so the GitHub reviewer rule
  # fires and the Environment Secrets become readable.
  deploy:
    name: Production deploy
    needs: isolation-audit
    runs-on: ubuntu-latest
    environment: production
    env:
      # Turborepo remote cache wiring. TURBO_TOKEN is an Environment
      # Secret (rotatable); TURBO_TEAM is a repo-level Action variable
      # (non-secret slug). Both must be present for remote cache hits
      # to register in the run log per Tech Spec § Caching strategy.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # Foundational env contract — surfaced from the production
      # Environment Secret store so `check-env` and the deploy CLIs
      # can read them. The validator refuses to proceed unless every
      # key tagged with a `# shape:` marker in `.env.example` is
      # present and shape-valid.
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # The pnpm store is cached here, keyed on pnpm-lock.yaml's
          # hash, so subsequent runs report a cache hit in the log.
          cache: pnpm

      - name: Compute SENTRY_RELEASE (short SHA)
        id: release
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "release=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "SENTRY_RELEASE=${short_sha}" >> "$GITHUB_ENV"

      # ── Step 1: install ────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 2: validate environment contract ──────────────────────
      # Runs BEFORE any state mutation. A missing or malformed key
      # aborts the workflow before drizzle or wrangler can leave the
      # production DB / Workers state half-mutated.
      - name: Validate environment (check-env)
        run: node scripts/check-env.mjs

      # ── Step 3: production migrations ──────────────────────────────
      # Guarded by hashFiles so the step is a green no-op until the
      # apps/api workspace lands in a later Epic.
      - name: Detect apps/api workspace
        id: detect-api
        run: |
          if [ -n "$(ls -A apps/api 2>/dev/null || true)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run production migrations (drizzle-kit migrate)
        if: steps.detect-api.outputs.present == 'true' && hashFiles('apps/api/**') != ''
        run: pnpm --filter @repo/api exec drizzle-kit migrate

      # ── Step 4: deploy api Worker ──────────────────────────────────
      - name: Deploy API to Cloudflare Workers (production)
        id: deploy-api
        if: steps.detect-api.outputs.present == 'true' && hashFiles('apps/api/**') != ''
        run: pnpm --filter @repo/api exec wrangler deploy --env production

      # ── Step 5: deploy web Pages ───────────────────────────────────
      - name: Detect apps/web workspace
        id: detect-web
        run: |
          if [ -n "$(ls -A apps/web 2>/dev/null || true)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web for production
        if: steps.detect-web.outputs.present == 'true' && hashFiles('apps/web/**') != ''
        run: pnpm --filter @repo/web run build

      - name: Deploy Web to Cloudflare Pages (production)
        id: deploy-web
        if: steps.detect-web.outputs.present == 'true' && hashFiles('apps/web/**') != ''
        run: >-
          pnpm --filter @repo/web exec wrangler pages deploy ./dist
          --project-name athportal-production
          --branch main

      # ── Step 6: Sentry release tagging ─────────────────────────────
      # Runs only if at least one deploy step actually executed. The
      # release tag is the short Git SHA, matching .env.example's
      # SENTRY_RELEASE convention.
      - name: Install sentry-cli
        if: >-
          (steps.deploy-api.outcome == 'success') ||
          (steps.deploy-web.outcome == 'success')
        run: npm install --global @sentry/cli@2

      - name: Create Sentry release
        if: >-
          (steps.deploy-api.outcome == 'success') ||
          (steps.deploy-web.outcome == 'success')
        run: sentry-cli releases new "$SENTRY_RELEASE"

      - name: Finalize Sentry release
        if: >-
          (steps.deploy-api.outcome == 'success') ||
          (steps.deploy-web.outcome == 'success')
        run: sentry-cli releases finalize "$SENTRY_RELEASE"

      # ── Step 7: summarize + link rollback runbook ─────────────────
      # AC-4: the final step writes a markdown link to the production
      # rollback runbook into $GITHUB_STEP_SUMMARY so an on-call
      # operator can reach the rollback procedure with a single click
      # from the run page.
      - name: Summarize deploy
        if: always()
        run: |
          {
            echo "### Production deploy summary"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Release tag: \`${SENTRY_RELEASE:-<unset>}\`"
            echo "- API deploy: ${{ steps.deploy-api.outcome || 'skipped' }}"
            echo "- Web deploy: ${{ steps.deploy-web.outcome || 'skipped' }}"
            echo ""
            echo "### Rollback"
            echo ""
            echo "If this deploy is unhealthy, follow the [production rollback runbook](../blob/main/docs/runbooks/rollback.md) — it covers \`workflow_dispatch deploy-production.yml\` with a prior release tag and \`wrangler rollback\` against the Workers surface."
          } >> "$GITHUB_STEP_SUMMARY"

name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Turborepo remote cache wiring. TURBO_TOKEN is a repo-level Secret
# (rotatable); TURBO_TEAM is a repo-level Action variable (non-secret
# slug). Both are read at the workflow level so every job's `turbo run …`
# invocation can resolve cache hits without per-job env duplication. The
# rationale tracks Tech Spec #388 § Caching strategy.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

# Cancel in-flight quality runs when a newer commit lands on the same PR (or
# the same ref for non-PR triggers). The group key folds in
# `github.event.pull_request.number` when the trigger is a pull request and
# falls back to `github.ref` otherwise, so `main`-push runs are scoped per
# ref and never self-cancel across unrelated commits.
concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint
        run: pnpm run lint

      - name: Lint baseline check
        run: pnpm run lint:baseline:check

      # Epic #9 / Story #616 — RBAC matrix drift check.
      # packages/shared/src/rbac/rules.ts is the source of truth for the
      # (role, resource, action) matrix; docs/data-dictionary.md publishes it
      # between <!-- rbac-matrix:start --> / <!-- rbac-matrix:end --> sentinels.
      # render-rbac-matrix.mjs --check re-derives the table from rules.ts and
      # fails if the doc has drifted. Fix locally with `--write`.
      - name: RBAC matrix drift check
        run: node scripts/render-rbac-matrix.mjs --check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test (unit + contract)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Test
        run: pnpm run test

  quality-baselines:
    # Combined baseline gate (ADR-015 coverage, ADR-018 CRAP, ADR-019
    # maintainability). One setup + one `pnpm run test:coverage` feeds all
    # three checks, eliminating two duplicate pnpm installs and two
    # redundant coverage-parsing passes versus the prior split jobs.
    name: Quality baselines (coverage ADR-015, CRAP ADR-018, maintainability ADR-019)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Generate coverage reports
        run: pnpm run test:coverage

      - name: Coverage baseline check
        run: pnpm run coverage:check

      - name: CRAP baseline check
        run: pnpm run crap:check

      - name: Maintainability baseline check
        run: pnpm run maintainability:check

  acceptance-smoke:
    name: Acceptance smoke (@smoke)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Cache Playwright browsers
        # Keyed on `pnpm-lock.yaml` so any Playwright version bump (which
        # rewrites its lockfile entry) invalidates the cache and forces a
        # fresh `playwright install`. Path matches Playwright's default
        # browser cache on Linux runners.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium

      - name: Generate BDD bindings
        run: pnpm --filter @repo/web exec bddgen

      - name: Run @smoke scenarios
        # CLERK_TEST_USER_PASSWORD (shared seed-user password) and
        # CLERK_SECRET_KEY (test-instance secret key consumed by
        # @clerk/testing/playwright) are operator-owned (per
        # docs/patterns.md § "Authenticated test sessions"). When either
        # repo secret is unset — e.g. on a fork PR or before the secret
        # has been wired — apps/web/e2e/fixtures/persona-global-setup.ts
        # short-circuits with a one-line warn, and
        # apps/web/playwright.config.ts omits the per-persona projects
        # entirely. The legacy anonymous + mobile-PWA projects continue
        # to run, so the @smoke gate stays meaningful either way.
        env:
          CLERK_TEST_USER_PASSWORD: ${{ secrets.CLERK_TEST_USER_PASSWORD }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: pnpm --filter @repo/web exec playwright test --grep @smoke

      - name: Upload Cucumber JSON
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cucumber-smoke
          path: apps/web/test-results/cucumber.json
          if-no-files-found: error

  lint-steps:
    name: Lint step definitions
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint step definitions
        run: pnpm run lint:steps

  lint-orphan-bem:
    # Story #834 / Task #840 — orphan BEM lint gate.
    # Walks apps/web/src/ and fails when any class name matching the
    # BEM block-element (foo__bar) or modifier (foo--bar) shape does
    # not resolve via the four ADR-0007 resolver paths (colocated
    # <style>, global.css, cva variant, colocated <script>). The
    # script also runs in .husky/pre-push as part of the fail-fast
    # local chain; this job is its CI mirror. Pre-existing orphans
    # tolerated by the codifying Story live in
    # .lint-orphan-bem-allowlist.json — follow-on Stories peel entries
    # off the allowlist as they refactor each surface. See
    # docs/decisions/0007-ui-styling-convention.md for the binding rule.
    name: lint-orphan-bem
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint orphan BEM hooks (ADR-0007)
        run: node scripts/lint-orphan-bem.mjs

  lint-astro-frontmatter:
    # Story #865 — Astro-frontmatter `<script` token lint.
    # Walks apps/web/src/**/*.astro and fails when a component's
    # frontmatter (`---` ... `---` block) contains the literal
    # `<script` token in a comment. Astro's compiler treats the token
    # as a real script-block opener and feeds the trailing comment
    # body to esbuild as JS, producing `pnpm dev` parser errors on
    # downstream consumers (PRs #862 and #864 fixed six instances of
    # this trap manually). This lint enforces the rewording
    # mechanically. Also runs in `.husky/pre-push`.
    name: lint-astro-frontmatter
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint Astro frontmatter for <script token
        run: node scripts/lint-astro-frontmatter.mjs

      - name: Unit-test the lint script itself
        run: node --test scripts/lint-astro-frontmatter.test.mjs

  lint-deps:
    # Story #590 — architecture-boundary gate.
    # Runs dependency-cruiser against apps/** and packages/** using the
    # rules in `.dependency-cruiser.cjs`, which encode the workspace
    # boundary invariants documented in docs/architecture.md §§ 1–2, 3.4,
    # and 5. No baseline / ratchet: a rule either holds or is explicitly
    # relaxed in the same PR (see docs/patterns.md § "Dependency
    # boundaries"). The mirroring `scripts/__tests__/architecture-
    # boundaries.test.mjs` exercises the same config under
    # `pnpm run test` so the signal shows up in two places.
    name: Lint dependencies (architecture boundaries)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint dependencies
        run: pnpm run lint:deps

  astro-build:
    # Story #745 (Task #746) — dedicated Astro build gate for @repo/web.
    # The umbrella `build` job runs `pnpm run build` which fans out via
    # turbo; this job pins the web workspace's `astro build` so toolchain
    # regressions (Astro config drift, route-syntax errors, script-block
    # TS parsing) surface as their own required check. Promote to
    # required-checks via repo settings.
    name: Astro build (@repo/web)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Astro build
        run: pnpm --filter @repo/web build

  supply-chain-security:
    # ADR-011 — supply-chain CVE gate. Runs `pnpm run audit:check` which
    # invokes `pnpm audit --json --prod` and fails on any unsuppressed
    # High/Critical advisory in the production graph. Moderate findings
    # surface in the uploaded `audit.json` artifact (14-day retention)
    # without blocking. The IGNORED allow-list in `scripts/audit-check.mjs`
    # is the suppression mechanism; every entry requires a non-empty
    # reason and a future revisit date.
    #
    # This job is the required check on `main` (configured in branch
    # protection settings via the GitHub UI). The `build` job below
    # `needs:` this so a failed audit blocks the deploy-targeted build
    # output even when branch protection isn't (yet) enforcing the
    # required-check contract.
    name: Supply-chain security (ADR-011)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Audit production graph (High/Critical block; Moderate surface)
        run: pnpm run audit:check

      - name: Upload audit.json artifact (14-day retention)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-audit
          path: audit.json
          retention-days: 14
          if-no-files-found: error

  gitleaks-pr:
    # Secret-scanner gate (PR-blocking) — companion to the TruffleHog job.
    # Fails the build on any detected secret, then uploads the SARIF
    # report to GitHub Code Scanning so findings surface in the Security
    # tab. `security-events: write` is scoped to this job alone.
    name: gitleaks (secret scan, PR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        with:
          # Emit SARIF alongside the JSON report so the upload step has a
          # canonical artifact regardless of whether the action found
          # secrets. `results.sarif` is gitleaks-action@v2's default
          # SARIF path.
          config-path: ""

      - name: Upload SARIF to GitHub Code Scanning
        # Always run so the Security tab receives the empty-findings
        # report on green PRs too — this is what makes the gate visible.
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      dist-found: ${{ steps.dist-probe.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Build
        run: pnpm run build

      # Story #393 introduced an `apps/*/dist/**` artifact pass-through to
      # bundle-size-baseline, but every workspace's `build` script is still
      # `exit 0` (no real wrangler/astro/expo output lands on disk until
      # Story #378 wires the wrangler build for apps/api). Upload is gated
      # behind a glob existence probe so the job stays green; flip back to a
      # hard upload once #378 lands and the dist tree is real.
      - name: Probe for dist outputs
        id: dist-probe
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(apps/*/dist/**)
          if [ ${#files[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dist artifact (consumed by bundle-size-baseline)
        if: steps.dist-probe.outputs.found == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-bundle
          path: apps/*/dist/**
          if-no-files-found: error

  bundle-size-baseline:
    name: Bundle-size baseline (1 MiB Worker cap + per-bundle gzippedKb, ADR-014)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      # NOTE: submodules: recursive is required even though this job doesn't
      # read .agents/ directly — `pnpm install` runs the root prepare script
      # `node .agents/scripts/sync-claude-commands.js`, which is in the
      # .agents/ submodule. Story #438's submodules: false optimization was
      # incompatible with that contract and is reverted here.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      # The dist artifact is only produced when at least one app emits real
      # build outputs (see the dist-probe step in `build`). Until Story #378
      # wires the wrangler build for apps/api, bundle-size:check reads the
      # placeholder size from .size-limit.json (apps/api/dist/worker.js
      # missing → treated as 0 bytes); the download is skipped on those
      # runs so the job stays green without an apps/*/dist tree on disk.
      - name: Download dist artifact (produced by `build`)
        if: needs.build.outputs.dist-found == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-bundle
          path: apps

      - name: Bundle-size baseline check
        run: pnpm run bundle-size:check

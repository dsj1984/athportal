name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Turborepo remote cache wiring. TURBO_TOKEN is a repo-level Secret
# (rotatable); TURBO_TEAM is a repo-level Action variable (non-secret
# slug). Both are read at the workflow level so every job's `turbo run …`
# invocation can resolve cache hits without per-job env duplication. The
# rationale tracks Tech Spec #388 § Caching strategy.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

# Cancel in-flight quality runs when a newer commit lands on the same PR (or
# the same ref for non-PR triggers). The group key folds in
# `github.event.pull_request.number` when the trigger is a pull request and
# falls back to `github.ref` otherwise, so `main`-push runs are scoped per
# ref and never self-cancel across unrelated commits.
concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Biome + ESLint + Markdown + RBAC drift)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint
        run: pnpm run lint

      - name: Lint baseline check
        run: pnpm run lint:baseline:check

      # Epic #9 / Story #616 — RBAC matrix drift check.
      # packages/shared/src/rbac/rules.ts is the source of truth for the
      # (role, resource, action) matrix; docs/data-dictionary.md publishes it
      # between <!-- rbac-matrix:start --> / <!-- rbac-matrix:end --> sentinels.
      # render-rbac-matrix.mjs --check re-derives the table from rules.ts and
      # fails if the doc has drifted. Fix locally with `--write`.
      - name: RBAC matrix drift check
        run: node scripts/render-rbac-matrix.mjs --check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Typecheck
        run: pnpm run typecheck

  # NOTE: The standalone `test` job was removed in the CI cleanup pass
  # (see `chore/ci-cleanup-quality-yml`). The `quality-baselines` job
  # below runs `pnpm run test:coverage`, which exercises every Vitest
  # project declared in the root `vitest.config.ts` (unit-node,
  # unit-jsdom, scripts, contract) — exactly the surface the dropped
  # `test` job covered, just with v8 coverage instrumentation layered
  # on top. Failing tests still fail the run before the baseline-check
  # steps execute. If you ever need a quick test-only signal without
  # coverage, run `pnpm run test` locally.

  quality-baselines:
    # Combined gate: unit + contract tests via `vitest run --coverage`,
    # then the three baseline ratchets (coverage ADR-015, CRAP ADR-018,
    # maintainability ADR-019). Test failures surface in the
    # "Generate coverage reports" step; coverage / CRAP / maintainability
    # regressions surface in the three baseline-check steps that follow.
    name: Tests + quality baselines (coverage + CRAP + maintainability)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Generate coverage reports
        run: pnpm run test:coverage

      - name: Coverage baseline check
        run: pnpm run coverage:check

      - name: CRAP baseline check
        run: pnpm run crap:check

      - name: Maintainability baseline check
        run: pnpm run maintainability:check

  acceptance-smoke:
    name: Acceptance smoke (Playwright @smoke scenarios)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Cache Playwright browsers
        # Keyed on `pnpm-lock.yaml` so any Playwright version bump (which
        # rewrites its lockfile entry) invalidates the cache and forces a
        # fresh `playwright install`. Path matches Playwright's default
        # browser cache on Linux runners.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium

      - name: Generate BDD bindings
        run: pnpm --filter @repo/web exec bddgen

      - name: Run @smoke scenarios
        # CLERK_TEST_USER_PASSWORD (shared seed-user password) and
        # CLERK_SECRET_KEY (test-instance secret key consumed by
        # @clerk/testing/playwright) are operator-owned (per
        # docs/patterns.md § "Authenticated test sessions"). When either
        # repo secret is unset — e.g. on a fork PR or before the secret
        # has been wired — apps/web/e2e/fixtures/persona-global-setup.ts
        # short-circuits with a one-line warn, and
        # apps/web/playwright.config.ts omits the per-persona projects
        # entirely. The legacy anonymous + mobile-PWA projects continue
        # to run, so the @smoke gate stays meaningful either way.
        env:
          CLERK_TEST_USER_PASSWORD: ${{ secrets.CLERK_TEST_USER_PASSWORD }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: pnpm --filter @repo/web exec playwright test --grep @smoke

      - name: Upload Cucumber JSON
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cucumber-smoke
          path: apps/web/test-results/cucumber.json
          if-no-files-found: error

  verify-stack:
    # Story #943 — verify the local-dev stack actually starts and answers
    # a documented allowlist of front-door URLs. Catches the entire class
    # of "the integration between the two long-lived processes is broken"
    # bugs that the Epic #11 manual-QA walkthrough (PR #940) surfaced —
    # specifically the Vite-proxy gap and the @clerk/backend v2/v3
    # middleware drift (Story #941). Boots `pnpm dev` in the background,
    # waits for the API health probe to answer 200, runs the smoke
    # script, then tears the dev processes down and uploads the captured
    # logs as a job artifact for triage.
    name: Verify-stack smoke (pnpm dev boots + URL allowlist)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # `/dev/sign-in-as/:persona` mints a Clerk sign-in ticket via the
      # Backend API, so it needs the test-instance secret. When the
      # secret is unset (fork PRs, before the secret is wired) the
      # smoke runner skips that one allowlist entry via the entry's
      # `requireEnv` field and the rest of the job stays meaningful.
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      # The dev seam refuses unless RUNTIME_ENV is development. The
      # Astro dev server reads this at request time via
      # `process.env.RUNTIME_ENV`.
      RUNTIME_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Synthesize .env for dev-preflight
        # `scripts/dev-preflight.mjs` (invoked by `pnpm dev`) refuses to
        # boot without a `.env` file populated with the five canonical
        # keys (CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY,
        # PUBLIC_CLERK_PUBLISHABLE_KEY, PUBLIC_API_URL, DATABASE_URL).
        # `.env` is gitignored, so CI synthesises one here from the
        # secrets the job already exports. The smoke allowlist hits
        # anonymous routes only — Clerk middleware mounts but never
        # actually validates a token during the smoke window — so
        # syntactically-valid `sk_test_…` / `pk_test_…` placeholders
        # satisfy the preflight on fork PRs where the secrets are
        # absent. The /dev/sign-in-as/coach entry self-skips via its
        # `requireEnv: ["CLERK_SECRET_KEY"]` field when the real
        # secret is missing, so a placeholder there is safe.
        run: |
          : "${CLERK_SECRET_KEY:=sk_test_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}"
          : "${CLERK_PUBLISHABLE_KEY:=pk_test_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}"
          cat > .env <<EOF
          NODE_ENV=development
          RUNTIME_ENV=development
          DATABASE_URL=file:packages/shared/data/local.db
          PUBLIC_API_URL=http://localhost:8787
          CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
          CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
          PUBLIC_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
          CLOUDFLARE_API_TOKEN=cf_token_placeholder
          CLOUDFLARE_ACCOUNT_ID=00000000000000000000000000000000
          EOF
          # Sanity log without leaking secret values — only the keys
          # the preflight scans for.
          echo "[ci] synthesised .env keys: $(grep -oE '^[A-Z_]+' .env | tr '\n' ' ')"

      - name: Reset and seed the local DB
        # `pnpm dev`'s preflight assumes the SQLite file exists and is
        # migrated. Running reset+seed up front is faster than letting
        # the dev preflight do its first-run dance under CI's slower
        # disk + giving the smoke runner a deterministic data set.
        run: pnpm --filter @repo/shared run db:reset && pnpm --filter @repo/shared run db:seed

      - name: Boot pnpm dev in the background
        # `setsid` puts pnpm in its own process group so the cleanup
        # step can SIGTERM the whole tree without leaving turbo /
        # tsx / astro child processes orphaned. The two output streams
        # are tee'd to separate files so the smoke runner's --log
        # flag can scan each independently and the artifact upload
        # ships both for triage.
        run: |
          mkdir -p logs
          setsid bash -c 'pnpm dev' \
            > >(tee logs/dev-stdout.log) \
            2> >(tee logs/dev-stderr.log >&2) \
            &
          echo $! > logs/dev.pid
          echo "[ci] pnpm dev pgid=$(ps -o pgid= -p $(cat logs/dev.pid) | tr -d ' ')"

      - name: Wait for /api/v1/health to answer 200
        # 60s budget. Astro + Hono cold-start on CI runners is well
        # under 20s normally; the budget covers a slow disk plus the
        # first-time esbuild pass. The `--max-time 2` on curl caps any
        # single probe so we don't blow the budget on one stuck poll.
        run: |
          for i in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://localhost:4321/api/v1/health || true)
            if [ "$status" = "200" ]; then
              echo "[ci] health probe answered 200 after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "[ci] health probe did not answer 200 within 60s — last status: ${status}"
          echo "[ci] tail dev-stderr.log:"
          tail -n 80 logs/dev-stderr.log || true
          exit 1

      - name: Run verify-stack smoke
        run: |
          node scripts/smoke/verify-stack.mjs \
            --base http://localhost:4321 \
            --log logs/dev-stdout.log \
            --log logs/dev-stderr.log

      - name: Tear down pnpm dev (always)
        if: always()
        run: |
          if [ -f logs/dev.pid ]; then
            pid=$(cat logs/dev.pid)
            pgid=$(ps -o pgid= -p $pid 2>/dev/null | tr -d ' ' || true)
            if [ -n "$pgid" ]; then
              echo "[ci] killing process group $pgid"
              kill -TERM -$pgid 2>/dev/null || true
              sleep 2
              kill -KILL -$pgid 2>/dev/null || true
            fi
          fi
          # Belt-and-braces: any survivor with our well-known names.
          pkill -f 'turbo run dev' 2>/dev/null || true
          pkill -f 'astro dev' 2>/dev/null || true
          pkill -f 'tsx watch' 2>/dev/null || true

      - name: Upload dev-server logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verify-stack-logs
          path: logs/
          if-no-files-found: warn

  targeted-lints:
    # Three small ~25-60s lint gates that previously each ran in their
    # own job — each paid the full `setup-toolchain` install cost
    # (checkout + pnpm + node + install ≈ 60s) for a few seconds of
    # actual work. Folded into one job (CI cleanup pass) so the install
    # happens once; the three lints run sequentially and the first to
    # fail names itself in the job log, so triage cost is unchanged.
    #
    # Step 1 — Playwright step-definition lint (no duplicate phrases /
    #   no forbidden patterns / no SQL or HTTP-status assertions inside
    #   step bodies). See `scripts/lint-steps.mjs`.
    # Step 2 — orphan BEM class-name lint (ADR-0007). Walks
    #   apps/web/src/ and fails when a `foo__bar` / `foo--bar` class
    #   doesn't resolve via the four sanctioned paths (colocated
    #   <style>, global.css, cva variant, colocated <script>).
    # Step 3 — Astro frontmatter `<script` token lint (Story #865).
    #   Walks apps/web/src/**/*.astro and fails when a frontmatter
    #   comment contains the literal `<script` token, which Astro's
    #   compiler treats as a real script-block opener and feeds to
    #   esbuild — breaking `pnpm dev` for downstream consumers.
    #
    # Step 4 — Astro route-collision guard (Story #1068). Walks
    #   apps/web/src/pages/ and fails when a non-`_`-prefixed `.ts`/`.tsx`
    #   file has an `.astro` sibling with the same stem. Astro warns today
    #   and will hard-error in a future major.
    #
    # Steps 2 + 3 also run in `.husky/pre-push` as part of the fail-fast
    # local chain; this job is their CI mirror. Step 3 additionally
    # runs the script's own self-test under `node --test`.
    name: Targeted lints (step defs, orphan BEM, Astro frontmatter)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint Playwright step definitions
        run: pnpm run lint:steps

      - name: Lint orphan BEM class names (ADR-0007)
        run: node scripts/lint-orphan-bem.mjs

      - name: Lint Astro frontmatter for the <script token trap
        run: node scripts/lint-astro-frontmatter.mjs

      - name: Unit-test the Astro frontmatter lint script itself
        run: node --test scripts/lint-astro-frontmatter.test.mjs

      - name: Lint Astro route collisions (Story #1068)
        run: node scripts/lint-astro-route-collisions.mjs

  qa-corpus:
    # Epic #775 — QA-corpus gates.
    # Three sequential checks against tests/charters/ (Test Plans retired in Epic #997):
    #   1. lint:qa — front-matter Zod schemas + body-shape rules
    #      (scripts/qa/lint.mjs)
    #   2. index:qa --check — tests/qa-index.json must be in sync with
    #      the live corpus (scripts/qa/index.mjs)
    #   3. coverage:qa --report — per-domain floors declared in
    #      scripts/qa/schema/coverage-floors.ts (PRD #781 AC-7) must
    #      hold; writes coverage/qa-coverage.json and exits 1 on gaps
    # Citation: Tech Spec #782 § CI integration; PRD #781 AC-4/AC-7/AC-8;
    # Acceptance Spec #783 AC-6/AC-14/AC-15.
    name: QA corpus (lint + index sync + coverage floors)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint QA corpus (front-matter + body shape)
        run: pnpm run lint:qa

      - name: Check QA index is in sync with the corpus
        run: pnpm run index:qa -- --check

      - name: Report QA coverage against per-domain floors
        run: pnpm run coverage:qa -- --report

      - name: Upload QA coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qa-coverage
          path: coverage/qa-coverage.json
          if-no-files-found: ignore

  lint-deps:
    # Story #590 — architecture-boundary gate.
    # Runs dependency-cruiser against apps/** and packages/** using the
    # rules in `.dependency-cruiser.cjs`, which encode the workspace
    # boundary invariants documented in docs/architecture.md §§ 1–2, 3.4,
    # and 5. No baseline / ratchet: a rule either holds or is explicitly
    # relaxed in the same PR (see docs/patterns.md § "Dependency
    # boundaries"). The mirroring `scripts/__tests__/architecture-
    # boundaries.test.mjs` exercises the same config under
    # `pnpm run test` so the signal shows up in two places.
    name: Lint dependencies (architecture boundaries)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Lint dependencies
        run: pnpm run lint:deps

  astro-build:
    # Story #745 (Task #746) — dedicated Astro build gate for @repo/web.
    # The umbrella `build` job runs `pnpm run build` which fans out via
    # turbo; this job pins the web workspace's `astro build` so toolchain
    # regressions (Astro config drift, route-syntax errors, script-block
    # TS parsing) surface as their own required check. Promote to
    # required-checks via repo settings.
    name: Astro build (@repo/web)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Astro build
        run: pnpm --filter @repo/web build

  supply-chain-security:
    # ADR-011 — supply-chain CVE gate. Runs `pnpm run audit:check` which
    # invokes `pnpm audit --json --prod` and fails on any unsuppressed
    # High/Critical advisory in the production graph. Moderate findings
    # surface in the uploaded `audit.json` artifact (14-day retention)
    # without blocking. The IGNORED allow-list in `scripts/audit-check.mjs`
    # is the suppression mechanism; every entry requires a non-empty
    # reason and a future revisit date.
    #
    # This job is the required check on `main` (configured in branch
    # protection settings via the GitHub UI). The `build` job below
    # `needs:` this so a failed audit blocks the deploy-targeted build
    # output even when branch protection isn't (yet) enforcing the
    # required-check contract.
    name: Supply-chain audit (pnpm audit, prod graph, ADR-011)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Audit production graph (High/Critical block; Moderate surface)
        run: pnpm run audit:check

      - name: Upload audit.json artifact (14-day retention)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-audit
          path: audit.json
          retention-days: 14
          if-no-files-found: error

  gitleaks-pr:
    # Secret-scanner gate (PR-blocking) — companion to the TruffleHog job.
    # Fails the build on any detected secret, then uploads the SARIF
    # report to GitHub Code Scanning so findings surface in the Security
    # tab. `security-events: write` is scoped to this job alone.
    name: "Secret scan: gitleaks (PR diff)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        with:
          # Emit SARIF alongside the JSON report so the upload step has a
          # canonical artifact regardless of whether the action found
          # secrets. `results.sarif` is gitleaks-action@v2's default
          # SARIF path.
          config-path: ""

      - name: Upload SARIF to GitHub Code Scanning
        # Always run so the Security tab receives the empty-findings
        # report on green PRs too — this is what makes the gate visible.
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  build:
    name: Build (turbo fan-out, all workspaces)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      dist-found: ${{ steps.dist-probe.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (checkout + pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      - name: Build
        run: pnpm run build

      # Story #393 introduced an `apps/*/dist/**` artifact pass-through to
      # bundle-size-baseline, but every workspace's `build` script is still
      # `exit 0` (no real wrangler/astro/expo output lands on disk until
      # Story #378 wires the wrangler build for apps/api). Upload is gated
      # behind a glob existence probe so the job stays green; flip back to a
      # hard upload once #378 lands and the dist tree is real.
      - name: Probe for dist outputs
        id: dist-probe
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(apps/*/dist/**)
          if [ ${#files[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dist artifact (consumed by bundle-size-baseline)
        if: steps.dist-probe.outputs.found == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-bundle
          path: apps/*/dist/**
          if-no-files-found: error

  bundle-size-baseline:
    name: Bundle-size baseline (Worker 1 MiB cap, ADR-014)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      # NOTE: submodules: recursive is required even though this job doesn't
      # read .agents/ directly — `pnpm install` runs the root prepare script
      # `node .agents/scripts/sync-claude-commands.js`, which is in the
      # .agents/ submodule. Story #438's submodules: false optimization was
      # incompatible with that contract and is reverted here.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up toolchain (pnpm + node + install)
        uses: ./.github/actions/setup-toolchain

      # The dist artifact is only produced when at least one app emits real
      # build outputs (see the dist-probe step in `build`). Until Story #378
      # wires the wrangler build for apps/api, bundle-size:check reads the
      # placeholder size from .size-limit.json (apps/api/dist/worker.js
      # missing → treated as 0 bytes); the download is skipped on those
      # runs so the job stays green without an apps/*/dist tree on disk.
      - name: Download dist artifact (produced by `build`)
        if: needs.build.outputs.dist-found == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-bundle
          path: apps

      - name: Bundle-size baseline check
        run: pnpm run bundle-size:check

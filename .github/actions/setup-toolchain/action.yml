name: Setup toolchain
description: >-
  Canonical 3-step toolchain setup for athportal CI/CD jobs — pnpm (version
  read from package.json#packageManager), Node.js (version from .nvmrc, cache:
  pnpm), and `pnpm install --frozen-lockfile`. All `uses:` references are
  SHA-pinned per the project's pin convention.

  IMPORTANT: every job MUST run actions/checkout BEFORE this composite. A
  composite action's file (action.yml) is read off the runner filesystem, so
  the workspace must already exist when `uses: ./.github/actions/setup-toolchain`
  resolves. Jobs that read the `.agents/` submodule should pass
  `submodules: recursive` to actions/checkout; jobs that don't can omit it.

runs:
  using: composite
  steps:
    - name: Resolve pnpm version from package.json#packageManager
      id: pnpm-version
      shell: bash
      # Parse the major.minor.patch out of `"packageManager": "pnpm@9.15.9"`
      # so the pnpm version is pinned in exactly one human-edited place.
      run: |
        version="$(node -p "require('./package.json').packageManager.split('@')[1]")"
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: ${{ steps.pnpm-version.outputs.version }}

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

name: Setup toolchain
description: >-
  Canonical 4-step setup chain for athportal CI/CD jobs — checkout (submodules
  configurable, default 'recursive'; no persisted creds), pnpm (version read
  from package.json#packageManager), Node.js (version from .nvmrc, cache:
  pnpm), and `pnpm install --frozen-lockfile`. All `uses:` references are
  SHA-pinned per the project's pin convention.

inputs:
  submodules:
    description: >-
      Forwarded to actions/checkout's `submodules` input. Defaults to
      'recursive' so jobs that read the `.agents/` submodule keep working
      unchanged. Jobs that don't need `.agents/` should pass `'false'` to
      skip the submodule fetch and trim checkout cost.
    required: false
    default: 'recursive'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        submodules: ${{ inputs.submodules }}
        persist-credentials: false

    - name: Resolve pnpm version from package.json#packageManager
      id: pnpm-version
      shell: bash
      # Parse the major.minor.patch out of `"packageManager": "pnpm@9.15.9"`
      # so the pnpm version is pinned in exactly one human-edited place.
      run: |
        version="$(node -p "require('./package.json').packageManager.split('@')[1]")"
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: ${{ steps.pnpm-version.outputs.version }}

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
